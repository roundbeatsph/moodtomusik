<script>
/* ---------- Countdown (visitor local time; target = PH midnight, UTC+8) ---------- */
(function(){
  var target=new Date("2026-07-17T00:00:00+08:00").getTime();
  var dd=document.getElementById("dd"),hh=document.getElementById("hh"),
      mm=document.getElementById("mm"),ss=document.getElementById("ss"),
      cd=document.getElementById("countdown"),on=document.getElementById("outnow"),
      ct=document.getElementById("cta-text");
  function pad(n){return n<10?"0"+n:""+n;}
  function tick(){
    var diff=target-Date.now();
    if(diff<=0){
      cd.style.display="none";on.hidden=false;
      ct.textContent="Stream Kape Lang Dapat";
      return;
    }
    var s=Math.floor(diff/1000);
    dd.textContent=pad(Math.floor(s/86400));
    hh.textContent=pad(Math.floor((s%86400)/3600));
    mm.textContent=pad(Math.floor((s%3600)/60));
    ss.textContent=pad(s%60);
  }
  tick();setInterval(tick,1000);
})();

/* ---------- Pre-save click -> Meta Pixel event ---------- */
(function(){
  var cta=document.getElementById("cta");
  if(cta) cta.addEventListener("click",function(){
    if(window.fbq){ fbq("track","Lead",{content_name:"Kape Lang Dapat pre-save"}); }
  });
})();

/* ---------- Video: tap-to-play, no autoplay, no loop ---------- */
(function(){
  var v=document.getElementById("hookvid"),ov=document.getElementById("playov");
  if(!v||!ov)return;
  ov.addEventListener("click",function(){ v.play(); });
  v.addEventListener("play",function(){ ov.classList.add("hidden"); });
  v.addEventListener("ended",function(){ ov.classList.remove("hidden"); });
})();

/* ---------- 3D coffee cup + steam (confined to hero) ---------- */
(function(){
  if(typeof THREE==="undefined")return;
  var reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var canvas=document.getElementById("scene");
  var renderer;
  try{ renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true}); }
  catch(e){ return; }

  function size(){ return {w:canvas.clientWidth||window.innerWidth, h:canvas.clientHeight||window.innerHeight}; }
  var s=size();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(s.w,s.h,false);

  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(38,s.w/s.h,0.1,100);
  camera.position.set(0,1.7,6.2);camera.lookAt(0,0.55,0);

  var cup=new THREE.Group();scene.add(cup);
  var profile=[[0.00,0.00],[0.56,0.00],[0.60,0.05],[0.62,0.14],[0.68,0.55],
    [0.77,1.02],[0.80,1.12],[0.74,1.12],[0.67,0.55],[0.61,0.18],[0.00,0.18]]
    .map(function(p){return new THREE.Vector2(p[0],p[1]);});
  var lathe=new THREE.LatheGeometry(profile,96);
  var ceramic=new THREE.MeshStandardMaterial({color:0x2a2320,roughness:0.58,metalness:0.06,side:THREE.DoubleSide});
  cup.add(new THREE.Mesh(lathe,ceramic));

  var coffee=new THREE.Mesh(new THREE.CircleGeometry(0.66,64),
    new THREE.MeshStandardMaterial({color:0x140c08,roughness:0.25,emissive:0x3a2410,emissiveIntensity:0.35}));
  coffee.rotation.x=-Math.PI/2;coffee.position.y=0.985;cup.add(coffee);

  var crema=new THREE.Mesh(new THREE.RingGeometry(0.5,0.65,64),
    new THREE.MeshBasicMaterial({color:0x6e4a26,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
  crema.rotation.x=-Math.PI/2;crema.position.y=0.99;cup.add(crema);

  var handle=new THREE.Mesh(new THREE.TorusGeometry(0.34,0.075,20,48,Math.PI*1.15),ceramic);
  handle.position.set(0.78,0.6,0);handle.rotation.z=-0.35;cup.add(handle);

  var saucer=new THREE.Mesh(new THREE.CylinderGeometry(1.25,1.05,0.07,64),
    new THREE.MeshStandardMaterial({color:0x241d19,roughness:0.5,metalness:0.05}));
  saucer.position.y=-0.06;cup.add(saucer);
  cup.position.y=-0.85;

  scene.add(new THREE.AmbientLight(0x3a2a1e,0.7));
  var key=new THREE.DirectionalLight(0xffd9a0,2.1);key.position.set(3,5,4);scene.add(key);
  var ember=new THREE.PointLight(0xd9743b,1.7,14);ember.position.set(-2.4,2.0,-2.2);scene.add(ember);
  var cafe=new THREE.PointLight(0xffe6bf,1.4,10);cafe.position.set(0,3.4,1.2);scene.add(cafe);

  function puff(){
    var c=document.createElement("canvas");c.width=c.height=64;var g=c.getContext("2d");
    var gr=g.createRadialGradient(32,32,0,32,32,32);
    gr.addColorStop(0,"rgba(232,220,200,0.9)");gr.addColorStop(0.4,"rgba(232,220,200,0.25)");gr.addColorStop(1,"rgba(232,220,200,0)");
    g.fillStyle=gr;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);
  }
  var COUNT=130,pos=new Float32Array(COUNT*3),seed=new Float32Array(COUNT);
  for(var i=0;i<COUNT;i++){
    pos[i*3]=(Math.random()-0.5)*0.7;pos[i*3+1]=0.6+Math.random()*2.6;pos[i*3+2]=(Math.random()-0.5)*0.7;
    seed[i]=Math.random()*Math.PI*2;
  }
  var pgeo=new THREE.BufferGeometry();pgeo.setAttribute("position",new THREE.BufferAttribute(pos,3));
  var steam=new THREE.Points(pgeo,new THREE.PointsMaterial({size:0.85,map:puff(),transparent:true,opacity:0.5,depthWrite:false,blending:THREE.AdditiveBlending,color:0xE8DCC8}));
  steam.position.y=-0.45;scene.add(steam);

  var mx=0,my=0,tmx=0,tmy=0;
  window.addEventListener("mousemove",function(e){tmx=(e.clientX/window.innerWidth-0.5);tmy=(e.clientY/window.innerHeight-0.5);});
  var t0=performance.now();
  function animate(now){
    var t=(now-t0)/1000;
    if(!reduce){
      cup.rotation.y=Math.sin(t*0.18)*0.5+t*0.05;
      var arr=pgeo.attributes.position.array;
      for(var i=0;i<COUNT;i++){
        arr[i*3+1]+=0.006+(i%5)*0.0012;
        arr[i*3]+=Math.sin(t*0.8+seed[i])*0.0016;
        arr[i*3+2]+=Math.cos(t*0.6+seed[i])*0.0012;
        if(arr[i*3+1]>3.4){arr[i*3]=(Math.random()-0.5)*0.6;arr[i*3+1]=0.6;arr[i*3+2]=(Math.random()-0.5)*0.6;}
      }
      pgeo.attributes.position.needsUpdate=true;
    }
    mx+=(tmx-mx)*0.04;my+=(tmy-my)*0.04;
    var breathe=reduce?0:Math.sin(t*0.5)*0.06;
    camera.position.x=mx*1.4;camera.position.y=1.7-my*0.8+breathe;camera.lookAt(0,0.55,0);
    renderer.render(scene,camera);requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  window.addEventListener("resize",function(){
    var z=size();camera.aspect=z.w/z.h;camera.updateProjectionMatrix();renderer.setSize(z.w,z.h,false);
  });
})();
</script>
